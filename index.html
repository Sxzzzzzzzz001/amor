<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Miranda ❤️ Mariano</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a0026, #000);
}

/* TEXTO */
#texto {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: white;
    font-family: Arial;
    animation: latido 1.5s infinite;
}

/* LATIDO */
@keyframes latido {
    0% {transform: scale(1);}
    50% {transform: scale(1.2);}
    100% {transform: scale(1);}
}

/* CANVAS */
canvas {
    display: block;
}
</style>
</head>

<body>

<div id="texto">Miranda ❤️ Mariano</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let corazones = [];

/* DIBUJAR CORAZON */
function dibujarCorazon(x, y, size, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x, y - size, x - size, y - size, x - size, y);
    ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.5, x, y + size * 2);
    ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size, x + size, y);
    ctx.bezierCurveTo(x + size, y - size, x, y - size, x, y);
    ctx.fill();
}

/* CREAR ARBOL */
function crearArbol() {
    for (let i = 0; i < 200; i++) {
        corazones.push({
            x: canvas.width / 2 + (Math.random() - 0.5) * 200,
            y: canvas.height / 2 - Math.random() * 200,
            size: Math.random() * 8 + 4,
            color: "hsl(" + (Math.random() * 50 + 330) + ", 100%, 70%)"
        });
    }
}

/* ANIMACION */
function animar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // tronco
    ctx.fillStyle = "#5a2d0c";
    ctx.fillRect(canvas.width/2 - 10, canvas.height/2, 20, 200);

    // corazones (hojas)
    corazones.forEach(c => {
        dibujarCorazon(c.x, c.y, c.size, c.color);

        // movimiento suave
        c.y += Math.sin(Date.now() / 500 + c.x) * 0.3;
    });

    requestAnimationFrame(animar);
}

/* INICIAR */
crearArbol();
animar();

/* PARTICULAS */
setInterval(() => {
    corazones.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2 - 200,
        size: Math.random() * 6 + 3,
        color: "pink"
    });
}, 300);

</script>

</body>
</html>
