<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Miranda ❤️ Mariano</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at bottom, #0a0015, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* TEXTO */
#texto {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
    font-size: 42px;
    color: #fff;
    text-shadow: 0 0 15px pink, 0 0 30px hotpink;
    animation: latido 1.6s infinite;
}

@keyframes latido {
    0% {transform: scale(1);}
    50% {transform: scale(1.08);}
    100% {transform: scale(1);}
}

/* CANVAS */
canvas {
    display: block;
}
</style>
</head>

<body>

<div id="texto">Miranda ❤️ Mariano</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particulas = [];

/* CREAR CORAZON BONITO */
function corazon(x, y, s, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(0, -3, -5, -3, -5, 0);
    ctx.bezierCurveTo(-5, 3, 0, 5, 0, 7);
    ctx.bezierCurveTo(0, 5, 5, 3, 5, 0);
    ctx.bezierCurveTo(5, -3, 0, -3, 0, 0);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
}

/* GENERAR FORMA DE ÁRBOL (mejor distribuido) */
function crearArbol() {
    for (let i = 0; i < 300; i++) {
        let angle = Math.random() * Math.PI;
        let radius = Math.random() * 150;

        particulas.push({
            x: canvas.width/2 + Math.cos(angle) * radius,
            y: canvas.height/2 - 100 + Math.sin(angle) * radius * 0.6,
            size: Math.random() * 0.8 + 0.5,
            color: `hsl(${330 + Math.random()*30},100%,70%)`,
            offset: Math.random() * 1000
        });
    }
}

/* ANIMACIÓN */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // TRONCO bonito
    ctx.fillStyle = "#3b1c0a";
    ctx.beginPath();
    ctx.moveTo(canvas.width/2 - 15, canvas.height/2 + 50);
    ctx.lineTo(canvas.width/2 + 15, canvas.height/2 + 50);
    ctx.lineTo(canvas.width/2 + 5, canvas.height/2 + 200);
    ctx.lineTo(canvas.width/2 - 5, canvas.height/2 + 200);
    ctx.fill();

    // HOJAS (corazones)
    particulas.forEach(p => {
        let float = Math.sin(Date.now()/1000 + p.offset) * 2;
        corazon(p.x, p.y + float, p.size, p.color);
    });

    requestAnimationFrame(draw);
}

crearArbol();
draw();

/* CORAZONES FLOTANDO */
setInterval(() => {
    particulas.push({
        x: canvas.width/2 + (Math.random()-0.5)*200,
        y: canvas.height/2 - 200,
        size: Math.random()*0.6 + 0.4,
        color: "pink",
        offset: Math.random()*1000
    });
}, 200);

</script>

</body>
</html>
