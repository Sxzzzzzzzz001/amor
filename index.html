<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mariano ❤️ Miri</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to top, #2b1055, #7597de);
}

/* TEXTO */
#frase {
    position: absolute;
    bottom: 60px;
    width: 100%;
    text-align: center;
    font-size: 38px;
    color: white;
    text-shadow: 0 0 20px pink, 0 0 40px hotpink;
    animation: latido 2s infinite;
}

@keyframes latido {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

canvas {
    display: block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="frase">Mariano ❤️ Miri</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* PARTÍCULAS (pétalos) */
let petals = [];

for (let i = 0; i < 200; i++) {
    petals.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 4 + 2,
        speed: Math.random() * 1 + 0.5,
        sway: Math.random() * 2
    });
}

/* DIBUJAR PÉTALO */
function drawPetal(x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x - s, y - s, x - s, y + s, x, y + s*1.5);
    ctx.bezierCurveTo(x + s, y + s, x + s, y - s, x, y);
    ctx.fillStyle = "rgba(255,182,193,0.8)";
    ctx.fill();
}

/* DIBUJAR ÁRBOL (silueta) */
function drawTree() {
    ctx.fillStyle = "#3b1c0a";

    ctx.beginPath();
    ctx.moveTo(canvas.width/2 - 20, canvas.height/2 + 100);
    ctx.lineTo(canvas.width/2 + 20, canvas.height/2 + 100);
    ctx.lineTo(canvas.width/2 + 10, canvas.height/2 + 300);
    ctx.lineTo(canvas.width/2 - 10, canvas.height/2 + 300);
    ctx.fill();

    // copa
    let gradient = ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2 - 50,
        20,
        canvas.width/2,
        canvas.height/2 - 50,
        200
    );

    gradient.addColorStop(0, "#ff99cc");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;

    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2 - 50, 200, 0, Math.PI*2);
    ctx.fill();
}

/* ANIMACIÓN */
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawTree();

    petals.forEach(p => {
        p.y += p.speed;
        p.x += Math.sin(p.y / 50) * p.sway;

        drawPetal(p.x, p.y, p.size);

        if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
